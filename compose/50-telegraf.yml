services:
  telegraf:
    image: telegraf:1.31
    container_name: netops-telegraf
    restart: unless-stopped
    network_mode: host
    user: root
    cap_add:
      - NET_RAW
    volumes:
      - /opt/netops-box/apps/telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - /etc/localtime:/etc/localtime:ro
