name: netops-box

services:
  zabbix-java-gateway:
    image: zabbix/zabbix-java-gateway:ubuntu-6.4-latest
    container_name: netops-zabbix-java-gateway
    restart: unless-stopped
    networks:
      - netops-network

  zabbix-server:
    image: zabbix/zabbix-server-mysql:ubuntu-6.4-latest
    container_name: netops-zabbix-server
    restart: unless-stopped
    env_file:
      - ../config/netops.env
    environment:
      DB_SERVER_HOST: netops-mysql
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      ZBX_JAVAGATEWAY: netops-zabbix-java-gateway
      ZBX_SERVER_NAME: netops-box
    ports:
      - "10051:10051"
    volumes:
      - ../data/zabbix/alertscripts:/usr/lib/zabbix/alertscripts
      - ../data/zabbix/enc:/var/lib/zabbix/enc
    networks:
      - netops-network
    depends_on:
      - zabbix-java-gateway

  zabbix-web:
    image: zabbix/zabbix-web-nginx-mysql:ubuntu-6.4-latest
    container_name: netops-zabbix-web
    restart: unless-stopped
    env_file:
      - ../config/netops.env
    environment:
      DB_SERVER_HOST: netops-mysql
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      ZBX_SERVER_HOST: netops-zabbix-server
      PHP_TZ: ${TZ}
    ports:
      - "8088:8080"
    networks:
      - netops-network
    depends_on:
      - zabbix-server

  zabbix-agent2:
    image: zabbix/zabbix-agent2:ubuntu-6.4-latest
    container_name: netops-zabbix-agent2
    restart: unless-stopped
    environment:
      ZBX_HOSTNAME: netops-box
      ZBX_SERVER_HOST: netops-zabbix-server
    ports:
      - "10050:10050"
    networks:
      - netops-network
    depends_on:
      - zabbix-server

networks:
  netops-network:
    external: true
